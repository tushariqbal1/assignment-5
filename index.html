<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- DaisyUi && tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto shadow-2xl my-8 rounded-lg">
    <div class="logo text-center pt-5">
        <img class="mx-auto w-[100px] mb-6" src="assets/github-logo.png" alt="logo">
        <h2 class="text-2xl font-semibold mb-1">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>

    <div class="form mt-7 ">
        <fieldset class="fieldset w-full  bg-base-200 border-base-300 rounded-box border p-4">

            <label class="label">Username</label>
            <input id="input-username" type="text" class="input w-full" placeholder="Email"  />
            <span class="text-[#4A00FF] font-semibold">Default: admin</span>

            <label class="label">Password</label>
            <input id="input-password" type="password" class="input w-full"  placeholder="Enter Password" />
            <span class="text-[#4A00FF] font-semibold">Default: admin123</span>

            <button id="login-btn" class="btn btn-primary mt-4">Sign in</button>

            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-4 text-gray-500 font-medium">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <p class="text-[#64748B] mb-1 text-center">Demo Credentials:</p>
            <p class="text-center"><span class="text-black font-semibold">Username:</span> admin</p>
            <p class="text-center"><span class="text-black font-semibold">Password:</span> admin123</p>
        </fieldset>
    </div>


    <script src="script/login.js"></script>
</body>

</html>
